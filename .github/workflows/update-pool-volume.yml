name: Update WIXS Pool Volume

on:
  schedule:
    - cron: '0 * * * *' # hourly at minute 0 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    name: Run updater and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (use PAT for push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            echo "No lockfile found — running 'npm install' instead of 'npm ci'"
            npm install
          fi

      - name: Run WIXS pool updater
        env:
          POLYGON_RPC: ${{ secrets.POLYGON_RPC }}
          POLYGON_RPC_LIST: ${{ secrets.POLYGON_RPC_LIST }}
          POLYGON_USDC: ${{ secrets.POLYGON_USDC }}
          POLYGONSCAN_KEY: ${{ secrets.POLYGONSCAN_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.POLYGONSCAN_KEY }}
          BLOCKS_PER_DAY: ${{ env.BLOCKS_PER_DAY }}
          LOG_CHUNK: '200'
          MAX_FETCH_PASSES: '2'
          MAX_CHUNK_TIME_MS: '5000'
          WINDOW_SECONDS: '3600'
        run: node ./scripts/update_pool_volume_polygonscan.js

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "public/data/pool_volume.json\|public/data/pool_volume_runs.json\|public/data/pool_volume_checkpoint.json"; then
            git add public/data/pool_volume.json public/data/pool_volume_runs.json public/data/pool_volume_checkpoint.json || true
            git commit -m "data: update pool volume from polygonscan updater [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No data changes"
          fi
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pool-volume-artifacts
          path: |
            public/data/pool_volume_runs.json
            public/data/pool_volume_alert.json

      - name: Check run alerts and fail if thresholds exceeded
        env:
          ALERT_POLYGONSCAN_CALLS: ${{ env.ALERT_POLYGONSCAN_CALLS || '50' }}
          ALERT_PROVIDER_BANS: ${{ env.ALERT_PROVIDER_BANS || '1' }}
        run: |
          node -e "const fs=require('fs'); const p='public/data/pool_volume_alert.json'; if(!fs.existsSync(p)){console.log('No alert file, continuing'); process.exit(0);} const a=JSON.parse(fs.readFileSync(p)); if(a.alert){ console.error('Run alert triggered:', a.reasons); process.exit(1);} console.log('No alerts')"

      - name: Deploy to Vercel (no commit)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod --confirm'
          working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
