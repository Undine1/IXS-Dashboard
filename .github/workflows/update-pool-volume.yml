name: Update Pool Volume

on:
  schedule:
    - cron: '0 * * * *' # hourly at minute 0 UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  VERCEL_CLI_VERSION: '50.23.2'

jobs:
  update:
    name: Run updater and commit
    runs-on: ubuntu-latest
    concurrency:
      group: dashboard-data-update
      cancel-in-progress: false
    timeout-minutes: 60
    steps:
      - name: Checkout repository (use PAT for push)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            echo "No lockfile found — running 'npm install' instead of 'npm ci'"
            npm install
          fi

      - name: Run pool updater
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BACKUP_INFURA_API_KEY: ${{ secrets.BACKUP_INFURA_API_KEY }}
          POLYGON_USDC: ${{ secrets.POLYGON_USDC }}
          BLOCKS_PER_DAY: ${{ env.BLOCKS_PER_DAY }}
          RPC_LOG_BLOCK_CHUNK: '200'
          RPC_MIN_LOG_BLOCK_CHUNK: '10'
          WINDOW_SECONDS: '3600'
          MAX_JITTER: '8'
        run: node ./scripts/update_pool_volume_indexer.js

      - name: Commit updated data files
        id: commit_data
        run: |
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "public/data/pool_volume.json\|public/data/pool_volume_runs.json\|public/data/pool_volume_checkpoint.json"; then
            git add public/data/pool_volume.json public/data/pool_volume_runs.json public/data/pool_volume_checkpoint.json || true
            git commit -m "data: update pool volume from indexer updater [skip ci]" || echo "No changes to commit"
            branch="${GITHUB_REF_NAME:-main}"
            max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${attempt}"
                echo "pushed=true" >> "$GITHUB_OUTPUT"
                break
              fi

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "::error::Push failed after ${max_attempts} attempts"
                exit 1
              fi

              echo "Push failed on attempt ${attempt}; rebasing and retrying..."
              sleep $((attempt * 5))
              git fetch origin "${branch}"
              git rebase "origin/${branch}" || {
                git rebase --abort || true
                echo "::warning::Rebase failed while retrying push"
                exit 1
              }
            done
          else
            echo "No data changes"
          fi
      - name: Upload run artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pool-volume-artifacts
          path: |
            public/data/pool_volume_runs.json
            public/data/pool_volume_alert.json

      - name: Check run alerts and fail if thresholds exceeded
        env:
          ALERT_INDEXER_CALLS: ${{ env.ALERT_INDEXER_CALLS || '200' }}
          ALERT_PROVIDER_BANS: ${{ env.ALERT_PROVIDER_BANS || '1' }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'public/data/pool_volume_alert.json';
          const maxCalls = Number(process.env.ALERT_INDEXER_CALLS || '200');
          const maxProvider = Number(process.env.ALERT_PROVIDER_BANS || '1');

          if (!fs.existsSync(p)) {
            console.log('No alert file, continuing');
            process.exit(0);
          }

          const a = JSON.parse(fs.readFileSync(p, 'utf8'));
          const apiCalls = Number(a.apiCallCount || 0);
          const reasons = Array.isArray(a.reasons) ? a.reasons.map(String) : [];
          const providerSignals = reasons.filter((r) => /request-failed|401|429|unauthorized|throttle|ban|forbidden|invalid-address/i.test(r)).length;
          const totalPools = Number(a.totalPoolCount || 0);
          const successfulPools = Number(a.successfulPoolCount || 0);
          const failedPools = Number(a.failedPoolCount || 0);
          const overCalls = apiCalls > maxCalls;
          const overProvider = providerSignals > maxProvider;
          const allPoolsFailed = totalPools > 0 && successfulPools === 0 && failedPools >= totalPools;

          if (a.alert || overCalls || overProvider || allPoolsFailed) {
            console.error('Run alert triggered', {
              alert: a.alert,
              apiCalls,
              maxCalls,
              providerSignals,
              maxProvider,
              totalPools,
              successfulPools,
              failedPools,
              allPoolsFailed,
              reasons,
            });
            process.exit(1);
          }

          console.log('No alerts', {
            apiCalls,
            providerSignals,
            maxCalls,
            maxProvider,
            totalPools,
            successfulPools,
            failedPools,
            allPoolsFailed,
          });
          NODE

      - name: Deploy to Vercel (best effort)
        if: ${{ steps.commit_data.outputs.pushed == 'true' }}
        shell: bash
        run: |
          set -o pipefail
          deploy_log="$(mktemp)"

          if npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee "$deploy_log"; then
            exit 0
          fi

          if grep -q 'api-deployments-free-per-day' "$deploy_log"; then
            echo "::warning::Skipping Vercel deploy because the free-tier daily deployment quota is exhausted."
            exit 0
          fi

          echo "::error::Vercel deploy failed for a reason other than the daily deployment quota."
          exit 1
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_USERCONFIG: /dev/null
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
