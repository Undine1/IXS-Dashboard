name: Update Holder Rankings

on:
  schedule:
    - cron: '2 * * * *' # hourly at minute 2 UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  VERCEL_CLI_VERSION: '50.23.2'

jobs:
  update:
    name: Build holder snapshot and deploy
    runs-on: ubuntu-latest
    concurrency:
      group: dashboard-data-update
      cancel-in-progress: false
    timeout-minutes: 90
    steps:
      - name: Checkout repository (use PAT for push)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            echo "No lockfile found, running 'npm install' instead of 'npm ci'"
            npm install
          fi

      - name: Run holder rankings updater
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          BACKUP_INFURA_API_KEY: ${{ secrets.BACKUP_INFURA_API_KEY }}
          HOLDER_RANKINGS_LIMIT: ${{ vars.HOLDER_RANKINGS_LIMIT }}
          HOLDER_RANKINGS_EXCLUDED_ADDRESSES: ${{ vars.HOLDER_RANKINGS_EXCLUDED_ADDRESSES }}
          HOLDER_RANKINGS_ETHEREUM_EXCLUDED_ADDRESSES: ${{ vars.HOLDER_RANKINGS_ETHEREUM_EXCLUDED_ADDRESSES }}
          HOLDER_RANKINGS_BASE_EXCLUDED_ADDRESSES: ${{ vars.HOLDER_RANKINGS_BASE_EXCLUDED_ADDRESSES }}
          HOLDER_RANKINGS_POLYGON_EXCLUDED_ADDRESSES: ${{ vars.HOLDER_RANKINGS_POLYGON_EXCLUDED_ADDRESSES }}
          NEXT_PUBLIC_ETH_BURN_ADDRESSES: ${{ vars.NEXT_PUBLIC_ETH_BURN_ADDRESSES }}
          NEXT_PUBLIC_BASE_BURN_ADDRESSES: ${{ vars.NEXT_PUBLIC_BASE_BURN_ADDRESSES }}
          NEXT_PUBLIC_POLYGON_BURN_ADDRESSES: ${{ vars.NEXT_PUBLIC_POLYGON_BURN_ADDRESSES }}
          HOLDER_RANKINGS_LOG_CHUNK: ${{ vars.HOLDER_RANKINGS_LOG_CHUNK }}
          HOLDER_RANKINGS_MIN_LOG_CHUNK: ${{ vars.HOLDER_RANKINGS_MIN_LOG_CHUNK }}
          HOLDER_RANKINGS_SAVE_EVERY_BATCHES: ${{ vars.HOLDER_RANKINGS_SAVE_EVERY_BATCHES }}
          HOLDER_RANKINGS_ETHEREUM_TOKEN_ADDRESS: ${{ vars.HOLDER_RANKINGS_ETHEREUM_TOKEN_ADDRESS }}
          HOLDER_RANKINGS_BASE_TOKEN_ADDRESS: ${{ vars.HOLDER_RANKINGS_BASE_TOKEN_ADDRESS }}
          HOLDER_RANKINGS_POLYGON_TOKEN_ADDRESS: ${{ vars.HOLDER_RANKINGS_POLYGON_TOKEN_ADDRESS }}
          HOLDER_RANKINGS_ETHEREUM_START_BLOCK: ${{ vars.HOLDER_RANKINGS_ETHEREUM_START_BLOCK }}
          HOLDER_RANKINGS_BASE_START_BLOCK: ${{ vars.HOLDER_RANKINGS_BASE_START_BLOCK }}
          HOLDER_RANKINGS_POLYGON_START_BLOCK: ${{ vars.HOLDER_RANKINGS_POLYGON_START_BLOCK }}
        run: npm run update:holder-rankings

      - name: Commit updated snapshot files
        id: commit_snapshot
        run: |
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "public/data/holder_rankings.json\|data/holder_rankings_state.json"; then
            git add public/data/holder_rankings.json data/holder_rankings_state.json
            git commit -m "data: update holder rankings snapshot [skip ci]" || echo "No changes to commit"
            branch="${GITHUB_REF_NAME:-main}"
            max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${attempt}"
                echo "pushed=true" >> "$GITHUB_OUTPUT"
                break
              fi

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "::error::Push failed after ${max_attempts} attempts"
                exit 1
              fi

              echo "Push failed on attempt ${attempt}; rebasing and retrying..."
              sleep $((attempt * 5))
              git fetch origin "${branch}"
              git rebase "origin/${branch}" || {
                git rebase --abort || true
                echo "::warning::Rebase failed while retrying push"
                exit 1
              }
            done
          else
            echo "No snapshot changes"
          fi

      - name: Upload holder snapshot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: holder-rankings-artifacts
          path: |
            public/data/holder_rankings.json
            data/holder_rankings_state.json

      - name: Deploy to Vercel (best effort)
        if: ${{ steps.commit_snapshot.outputs.pushed == 'true' }}
        shell: bash
        run: |
          set -o pipefail
          deploy_log="$(mktemp)"

          if npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee "$deploy_log"; then
            exit 0
          fi

          if grep -q 'api-deployments-free-per-day' "$deploy_log"; then
            echo "::warning::Skipping Vercel deploy because the free-tier daily deployment quota is exhausted."
            exit 0
          fi

          echo "::error::Vercel deploy failed for a reason other than the daily deployment quota."
          exit 1
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_USERCONFIG: /dev/null
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
