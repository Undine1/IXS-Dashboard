specVersion: 0.0.2
description: USDC Transfer indexer for IXS pool on Polygon
repository: ""
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: USDC
    network: polygon
    source:
      address: "0x2791bca1f2de4661ed88a30c99a7a9449aa84174"
      abi: ERC20
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.5
      language: wasm/assemblyscript
      entities:
        - TransferEntity
        - Pool
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mapping.ts
